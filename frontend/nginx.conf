server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # Allow base64 company-logo payloads (matches backend express limit)
    client_max_body_size 5m;

    # Proxy /api/* to backend service (Docker-internal only)
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        # Inject internal API key from env var — set at container start via envsubst
        proxy_set_header   X-Api-Key       "${BACKEND_API_SECRET}";
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
